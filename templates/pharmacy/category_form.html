{% extends 'base/base.html' %}
{% block title %}Add Category{% endblock %}
{% block page_title %}Add Medicine Category{% endblock %}
{% block content %}
<div class="card" style="max-width:500px;margin:auto;">
  <div class="card-header py-3 px-4"><i class="fas fa-tag me-2"></i>Add Category</div>
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3"><label class="form-label fw-semibold">Name *</label><input type="text" name="name" class="form-control" required></div>
      <div class="mb-3"><label class="form-label fw-semibold">Description</label><textarea name="description" class="form-control" rows="3"></textarea></div>
      <div class="d-flex gap-2"><button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>Save</button><a href="{% url 'category_list' %}" class="btn btn-outline-secondary">Cancel</a></div>
    </form>
  </div>
</div>
{% endblock %}
